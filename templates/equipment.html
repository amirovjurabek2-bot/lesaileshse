<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LES AILES HSE | Equipment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

.navbar{
background:#d50000;
}

.navbar-brand{
color:white!important;
font-weight:bold;
font-size:24px;
}

.top-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-top:25px;
margin-bottom:25px;
}

.btn-les{
background:#d50000;
color:white;
border:none;
}

.btn-les:hover{
background:#b00000;
color:white;
}

.table{
vertical-align:middle;
}

thead{
background:#d50000;
color:white;
}

.badge-ok{
background:#198754;
padding:8px 12px;
border-radius:20px;
color:white;
}

.action-btn{

width:36px;
height:36px;

display:inline-flex;

align-items:center;

justify-content:center;

border-radius:8px;

margin-right:5px;

color:white;

text-decoration:none;

}

.edit{

background:#0d6efd;

}

.delete{

background:#dc3545;

}

.edit:hover{

background:#0955c4;

}

.delete:hover{

background:#b02a37;

}

.footer{

margin-top:40px;

text-align:center;

color:#777;

padding:20px;

}

</style>

</head>

<body>

<nav class="navbar">

<div class="container-fluid">

<a class="navbar-brand" href="/">
🛠 LES AILES HSE SYSTEM
</a>

</div>

</nav>

<div class="container">

<div class="top-card">

<div class="row">

<div class="col-md-3">

<a href="/" class="btn btn-secondary w-100">
<i class="fa fa-arrow-left"></i>
Dashboard
</a>

</div>

<div class="col-md-3">

<button
class="btn btn-les w-100"
data-bs-toggle="modal"
data-bs-target="#addModal">

<i class="fa fa-plus"></i>

Янги дастгоҳ

</button>

</div>

<div class="col-md-3">

<select
id="branchFilter"
class="form-select"
onchange="window.location='?branch='+this.value">

<option value="">Барча филиаллар</option>

{% for b in branches %}

<option value="{{ b }}"
{% if b==selected_branch %}selected{% endif %}>
{{ b }}
</option>

{% endfor %}

</select>

</div>

<div class="col-md-3">

<input
type="text"
id="searchBox"
class="form-control"
placeholder="🔍 Қидириш...">

</div>

</div>

</div>
<div class="card shadow">

<div class="card-body">

<table
id="equipmentTable"
class="table table-striped table-hover align-middle">

<thead>

<tr>

<th width="70">№</th>

<th>Дастгоҳ</th>

<th>Инвентар №</th>

<th>Филиал</th>

<th width="120">Ҳолати</th>

<th width="170">Амаллар</th>

</tr>

</thead>

<tbody>

{% for i in items %}

<tr>

<td>{{ loop.index }}</td>

<td>
<b>{{ i["name"] }}</b>
</td>

<td>{{ i["inventory"] }}</td>

<td>{{ i["branch"] }}</td>

<td>

<span class="badge-ok">

Ишлаяпти

</span>

</td>

<td>

<a
href="/equipment/edit/{{ i['id'] }}"
class="action-btn edit">

<i class="fa fa-pen"></i>

</a>

<a
href="/equipment/delete/{{ i['id'] }}"
class="action-btn delete"

onclick="return confirm('Ушбу дастгоҳни ўчиришни хоҳлайсизми?')">

<i class="fa fa-trash"></i>

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->

<div
class="modal fade"
id="addModal"
tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<form
method="POST"
action="/equipment/add">

<div class="modal-header">

<h5 class="modal-title">

➕ Янги дастгоҳ

</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>

Дастгоҳ номи

</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Инвентар рақами

</label>

<input
type="text"
name="inventory"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Филиал

</label>

<select
name="branch"
class="form-select">

{% for b in branches %}

<option value="{{ b }}">

{{ b }}

</option>

{% endfor %}

</select>

</div>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">

Бекор қилиш

</button>

<button
type="submit"
class="btn btn-les">

💾 Сақлаш

</button>

</div>

</form>

</div>

</div>

</div>
<footer class="footer">

<hr>

<p>

© 2026 LES AILES HSE SYSTEM

</p>

</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>

$(document).ready(function(){

let table=$("#equipmentTable").DataTable({

pageLength:25,

lengthMenu:[

[10,25,50,100,-1],

[10,25,50,100,"Барчаси"]

],

language:{

search:"Қидириш:",

lengthMenu:"_MENU_ та кўрсатиш",

zeroRecords:"Маълумот топилмади",

info:"_TOTAL_ тадан _START_ - _END_",

infoEmpty:"Маълумот йўқ",

paginate:{

previous:"⬅",

next:"➡"

}

}

});

$("#searchBox").keyup(function(){

table.search($(this).val()).draw();

});

});

</script>

</body>

</html>
