<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<title>Ишчилар базаси</title>

<style>
.upload-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.upload-card h3{
    margin-bottom:5px;
    color:#d50000;
}

.upload-card p{
    margin-bottom:15px;
    color:#666;
    font-size:14px;
}

.upload-form{
    display:flex;
    gap:10px;
    align-items:center;
}

.upload-form input[type="file"]{
    border:1px solid #ccc;
    padding:8px;
    border-radius:6px;
    background:#f9f9f9;
}

.upload-form button{
    background:#d50000;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.upload-form button:hover{
    background:#b30000;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
    background:#f5f5f5;
    color:#000;
}
.header{

background:#d50000;

color:white;

padding:20px;

text-align:center;

}

.container{

width:1200px;

margin:30px auto;

}

.top{

display:flex;

justify-content:space-between;

margin-bottom:20px;

}

.back{

background:#d50000;

color:white;

padding:10px 20px;

text-decoration:none;

border-radius:6px;

}

.search{

padding:10px;

width:300px;

border-radius:6px;

border:1px solid #ccc;

}

.form{

background:white;

padding:20px;

border-radius:10px;

margin-bottom:20px;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}

form{

display:flex;

gap:10px;

flex-wrap:wrap;

}

input{

padding:10px;

width:220px;

}

button{

background:#d50000;

color:white;

border:none;

padding:10px 20px;

border-radius:6px;

cursor:pointer;

}

table{

width:100%;

border-collapse:collapse;

background:white;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}

th{

background:#d50000;

color:white;

padding:15px;

}

td{
    padding:12px;
    text-align:center;
    border:1px solid #ddd;
    color:#000;
    background:#fff;
}
.danger{

background:#ffd5d5;

}

.warning{

background:#fff4b5;

}

.normal{

background:white;

}

.action{

padding:6px 12px;

font-size:14px;

}

</style>

</head>

<body>

<div class="header">

<h1>👥 ИШЧИЛАР БАЗАСИ</h1>

</div>

<div class="container">

<div class="top">

<a href="/" class="back">

⬅ Dashboard

</a>

<input
class="search"
id="search"
placeholder="Ишчини қидириш..."
onkeyup="searchTable()">

</div>

<div class="form">

<form method="POST" action="/add">

<input
name="fullname"
placeholder="Ф.И.О"
required>

<input
name="position"
placeholder="Лавозим"
required>

<input
name="phone"
placeholder="Телефон"
required>

<input
type="date"
name="medical_date"
required>

<button>

➕ Қўшиш

</button>

</form>

</div>

<table id="employeesTable">

<tr>

<th>ID</th>

<th>Ф.И.О</th>

<th>Лавозим</th>

<th>Телефон</th>

<th>Тиббий кўрик</th>

<th>Амаллар</th>

</tr>

{% for e in employees %}
<tr>
    <td>{{ e[0] }}</td>
    <td>{{ e[1] }}</td>
    <td>{{ e[2] }}</td>
    <td>{{ e[3] }}</td>
    <td>{{ e[4] }}</td>

    <td>
        <a href="/edit/{{ e[0] }}">
            <button class="action">✏️</button>
        </a>

        <a href="/delete/{{ e[0] }}">
            <button class="action">🗑</button>
        </a>
    </td>
</tr>
{% endfor %}
</table>
<div class="upload-card">

    <h3>📥 Excel юклаш</h3>
    <p>Ишчиларни Excel файл орқали базага қўшиш</p>

    <form action="/upload_excel" method="POST" enctype="multipart/form-data" class="upload-form">

        <input type="file" name="file" id="fileInput" required>

        <button type="submit">
            🚀 Юклаш
        </button>

    </form>

</div>


</div>

<script>

function searchTable(){

let input=document.getElementById("search");

let filter=input.value.toUpperCase();

let table=document.getElementById("employeesTable");

let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let td=tr[i].getElementsByTagName("td")[1];

if(td){

let txt=td.textContent||td.innerText;

tr[i].style.display=txt.toUpperCase().indexOf(filter)>-1?"":"none";

}

}

}

</script>

</body>

</html>
