<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Тиббий кўрик</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#d50000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:1100px;
margin:30px auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#d50000;
color:white;
padding:15px;
}

td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

.back{
display:inline-block;
margin-bottom:20px;
background:#d50000;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="header">
<h1>🩺 ТИББИЙ КЎРИК НАЗОРАТИ</h1>
</div>

<div class="container">

<a href="/" class="back">⬅ Dashboard</a>

<table>

<tr>
<th>Ф.И.О</th>
<th>Лавозим</th>
<th>Тиббий кўрик санаси</th>
</tr>

{% for e in employees %}

<tr>

<td>{{ e[0] }}</td>
<td>{{ e[1] }}</td>
<td>{{ e[2] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
