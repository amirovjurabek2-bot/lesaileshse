<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<title>Йўриқномалар</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

.header{

background:#d50000;

color:white;

padding:25px;

text-align:center;

}

.container{

width:1100px;

margin:40px auto;

display:grid;

grid-template-columns:repeat(2,1fr);

gap:25px;

}

.card{

background:white;

padding:35px;

border-radius:10px;

text-decoration:none;

color:black;

text-align:center;

box-shadow:0 5px 15px rgba(0,0,0,.15);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card h1{

font-size:60px;

margin-bottom:20px;

}

.back{

display:inline-block;

margin:25px;

background:#d50000;

color:white;

padding:12px 20px;

text-decoration:none;

border-radius:6px;

}
.toolbar{
width:1100px;
margin:30px auto 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.search{
width:350px;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

.add-btn{
background:#d50000;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

table{
width:1100px;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
background:#d50000;
color:white;
padding:14px;
}

td{
padding:14px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#f8f8f8;
}

.action{
padding:8px 14px;
background:#d50000;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:2px;
}

.word{
color:#1565C0;
font-weight:bold;
}

.pdf{
color:#E53935;
font-weight:bold;
}

.ppt{
color:#F57C00;
font-weight:bold;
}

</style>

</head>

<body>

<a href="/" class="back">⬅ Dashboard</a>

<div class="header">

<h1>📚 ЙЎРИҚНОМАЛАР</h1>

</div>

<div class="toolbar">

<input
type="text"
class="search"
placeholder="🔍 Ҳужжат қидириш...">

{% if role=="admin" %}
<a href="/upload" class="add-btn">
➕ Файл қўшиш
</a>
{% endif %}
</div>

<table>
<tr>
    <th>Ҳужжат номи</th>
    <th>Амаллар</th>
</tr>

{% for filename in files %}
<tr>
    <td>{{ filename }}</td>

    <td>
        <a href="/uploads/{{ filename }}">
            <button class="action">👁</button>
        </a>

        {% if role=="admin" %}
        <button class="action">✏</button>
        <button class="action">🗑</button>
        {% endif %}
    </td>
</tr>
{% endfor %}
</table>
</body>
</html>
