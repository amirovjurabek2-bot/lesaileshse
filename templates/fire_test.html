<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">

<title>Ёнғин хавфсизлиги</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#d50000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:1000px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

button{
background:#d50000;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:18px;
}

.back{
display:inline-block;
margin-bottom:20px;
background:#444;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="header">

<h1>🔥 Ёнғин хавфсизлиги тести</h1>

</div>

<div class="container">

<a href="/test" class="back">⬅ Орқага</a>

<form>

{% for t in tests %}

<div class="card">

<h3>{{ loop.index }}. {{ t[1] }}</h3>

<p><input type="radio" name="q{{t[0]}}"> {{t[2]}}</p>

<p><input type="radio" name="q{{t[0]}}"> {{t[3]}}</p>

<p><input type="radio" name="q{{t[0]}}"> {{t[4]}}</p>

<p><input type="radio" name="q{{t[0]}}"> {{t[5]}}</p>

</div>

{% endfor %}

<button type="submit">

Тестни якунлаш

</button>

</form>

</div>

</body>

</html>
