<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>HSE Test</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
h2{
    text-align:center;
    padding:20px;
    margin:0;
    background:#d50000;
    color:white;
}

/* FORM CONTAINER */
form{
    max-width:900px;
    margin:30px auto;
    padding:10px;
}

/* QUESTION CARD */
.q{
    background:white;
    padding:18px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* QUESTION TEXT */
.q h3{
    margin-bottom:12px;
    color:#222;
}

/* OPTIONS */
label{
    display:block;
    padding:10px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
    background:#fafafa;
    transition:0.2s;
}

label:hover{
    background:#f0f0f0;
    border-color:#d50000;
}

/* RADIO */
input[type="radio"]{
    margin-right:10px;
    transform:scale(1.2);
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    background:#d50000;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#b30000;
}

/* MOBILE */
@media(max-width:600px){
    form{
        padding:10px;
    }
}

</style>
</head>

<body>

<h2>📘 HSE TEST</h2>

<form method="POST">

{% for q in tests %}

<div class="q">
    <h3>{{ loop.index }}. {{ q["q"] }}</h3>

    <label>
        <input type="radio" name="q{{ loop.index0 }}" value="1">
        {{ q["a"][0] }}
    </label>

    <label>
        <input type="radio" name="q{{ loop.index0 }}" value="2">
        {{ q["a"][1] }}
    </label>

    <label>
        <input type="radio" name="q{{ loop.index0 }}" value="3">
        {{ q["a"][2] }}
    </label>

    <label>
        <input type="radio" name="q{{ loop.index0 }}" value="4">
        {{ q["a"][3] }}
    </label>

</div>

{% endfor %}

<button type="submit">Yakunlash</button>

</form>

</body>
</html>
