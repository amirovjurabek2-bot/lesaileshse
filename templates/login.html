<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Les Ailes HSE Login</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.box{
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#d50000;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Les Ailes HSE</h2>

<form method="POST">

<input type="text"
       name="username"
       placeholder="Login">

<input type="password"
       name="password"
       placeholder="Parol">

<button>Kirish</button>

</form>

</div>

</body>
</html>
