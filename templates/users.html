<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">
<title>Фойдаланувчилар</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
}

.header{
    background:#d50000;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:1100px;
    margin:30px auto;
}

.back{
    background:#d50000;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:6px;
}

.form{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

input,select{
    padding:10px;
    width:220px;
    margin:5px;
}

button{
    background:#d50000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

th{
    background:#d50000;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

.delete{
    background:#d50000;
    color:white;
    padding:6px 12px;
    text-decoration:none;
    border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<h1>👤 Фойдаланувчилар</h1>

<th>Филиал</th>

</div>

<div class="container">

<a href="/" class="back">⬅ Dashboard</a>

<div class="form">

<form method="POST" action="/users/add">

<input
name="username"
placeholder="Login"
required>

<input
name="password"
placeholder="Parol"
required>

<select name="role">

<option value="user">User</option>

<option value="admin">Admin</option>

</select>
<select name="branch" required>

<option value="">Филиални танланг</option>

<option value="AZIYA">AZIYA</option>
<option value="KO'KCHA">KO'KCHA</option>
<option value="PARUS">PARUS</option>
<option value="SERGELI">SERGELI</option>
<option value="M.GORKIY">M.GORKIY</option>
<option value="ALPOMISH">ALPOMISH</option>
<option value="CHILONZOR">CHILONZOR</option>
<option value="FARXADSKIY">FARXADSKIY</option>
<option value="RIVEIRA">RIVEIRA</option>
<option value="HAMZA">HAMZA</option>
<option value="YUNUSOBOD">YUNUSOBOD</option>
<option value="OYBEK">OYBEK</option>
<option value="40 LET">40 LET</option>
<option value="C-5">C-5</option>
<option value="ZENIT">ZENIT</option>
<option value="MEGAPLANET">MEGAPLANET</option>
<option value="S.RAXIMOV">S.RAXIMOV</option>
<option value="NEXT">NEXT</option>
<option value="CHIMGAN">CHIMGAN</option>
<option value="SAMPI">SAMPI</option>
<option value="C-1">C-1</option>
<option value="BOCHKA">BOCHKA</option>
<option value="QO'YLIQ">QO'YLIQ</option>

</select>

<button>➕ Қўшиш</button>

</form>

</div>

<table>

<tr>

<th>ID</th>

<th>Login</th>

<th>Role</th>

<th>Амал</th>

</tr>

{% for u in users %}

<tr>

<td>{{ u.id }}</td>

<td>{{ u.username }}</td>

<td>{{ u.role }}</td>

<td>

<a
class="delete"
href="/users/delete/{{ u.id }}"
onclick="return confirm('Ўчирилсинми?')">

🗑 Ўчириш

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
